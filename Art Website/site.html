        <section? id="poems">
            <class="poem">
                <h3 class="poem-title">Destiny's knot</h3>
                <p class="poem-body">
                    At the end of all things,<br>
                    destiny waits — silent, knotted, patient.<br>
                    It asks only that I see it,<br>
                    take the thread,<br>
                    and let it guide me —<br>
                    guide me back to the place<br>
                    I've been longing for<br>
                    my entire life.</p>
